                title="Scroll to top"
              >↑</button>

              {/* Mode bar */}
              <div className="mode-bar">
                <div className="mode-bar-label">◈ INTELLIGENCE MODE</div>
                <div className="mode-btns">
                  <button className={`mode-btn ${forcedMode==="focused"?"m-focused":""}`} onClick={() => setForcedMode("focused")}>◈ FOCUSED</button>
                  <button className={`mode-btn ${forcedMode==="dual"?"m-dual":""}`} onClick={() => setForcedMode("dual")}>◈ DUAL</button>
                  <button className={`mode-btn ${forcedMode==="auto"?"m-auto":""}`} onClick={() => setForcedMode("auto")}>◈ AUTO</button>
                </div>
              </div>

              {/* Input row */}
              <div className="chat-input-row">
                <input type="file" accept=".pdf,.txt,.md" ref={attachRef} onChange={handleFileDrop} style={{display:"none"}}/>
                <button className={`attach-btn ${fileName ? "loaded" : ""}`} onClick={() => attachRef.current?.click()} title="Attach document" disabled={running}>
                  ◈
                </button>
                {fileName && (
                  <div className="file-pill">
                    <span className="file-pill-name">{fileName}</span>
                    <button className="file-pill-clear" onClick={clearFile} title="Remove file">✕</button>
                  </div>
                )}
                <textarea
                  ref={chatInputRef}
                  className="chat-text-input"
                  value={q}
                  onChange={e => setQ(e.target.value)}
                  onKeyDown={e => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); run(); } }}
                  placeholder={fileName ? `Ask about "${fileName}"...` : threadId ? "Continue this thread..." : "Ask anything — philosophical, factual, moral, scientific..."}
                  rows={1}
                  disabled={running}
                ></textarea>
                <button className="chat-send-btn" onClick={() => run()} disabled={running || (!q.trim() && !fileText)}>
                  {running ? "..." : "SEND ◈"}
                </button>
              </div>
            </div>

            {/* Debate panel — desktop */}
            <div className={`debate-panel ${debatePanelOpen?"":"collapsed"}`}>
              <div className="d-hdr">
                <div className="d-title">◈ RAW DEBATE</div>
                <div className="d-sub">{messages.length > 0 ? `TURN ${selectedTurn+1} OF ${messages.length}` : "NO ACTIVE THREAD"}</div>
              </div>
              {messages.length > 0 && (
                <div className="turn-wrap">
                  <div className="turn-strip" ref={stripRef} onScroll={onStripScroll} onMouseDown={onStripMouseDown} onMouseMove={onStripMouseMove} onMouseUp={onStripMouseUp} onMouseLeave={onStripMouseLeave}>
                    {messages.map((msg, idx) => (
                      <button key={msg.id}
                        className={`t-pill ${selectedTurn === idx ? "active" : ""}`}
                        onClick={() => onTurnPillClick(idx)}>
                        T{idx+1}
                      </button>
                    ))}
                  </div>
                  <div className="fade-r-d"/><div className="fade-l-d"/>
                </div>
              )}
              <div className="d-scroll">
                {messages.length === 0 ? (
                  <div className="d-empty">Run a query to see<br/>the raw agent debate here.</div>
                ) : selMsg?.pending ? (
                  <div className="d-empty">Agents processing...</div>
                ) : debateBlocks.length === 0 ? (
                  <div className="d-empty">No debate data<br/>for this turn.</div>
                ) : (
                  <>
                    <div className="d-q-label">"{selMsg?.question}"</div>
                    {debateBlocks.map((block, i) => {
                      const agent = AGENT_UI.find(a => a.key === block.key);
                      return (
                        <div key={i} className="d-block">
                          <div className="d-agent-row">
                            <div className="d-agent-nm" style={{color:agent?.color||"#aaa",marginBottom:0}}>{block.name}</div>
                            <DebateCopyBtn textToCopy={block.text} />
                          </div>
                          <div className="d-text">{block.text}</div>
                        </div>
                      );
                    })}
                  </>
                )}
              </div>
            </div>
          </div>

          {/* Mobile bottom nav */}
          <div className="mobile-bottom-nav">
            <div className="mobile-nav-tabs">
              <button className={`mobile-nav-tab ${mobileTab==="chat"?"active":""}`}
                onClick={() => { setMobileTab("chat"); setMobileDrawerOpen(false); }}>
                <span className="mobile-nav-icon">◈</span>
                <span className="mobile-nav-label">CHAT</span>
              </button>
              <button className={`mobile-nav-tab ${mobileTab==="threads"?"active":""}`}
                onClick={() => {
                  if (mobileTab === "threads" && mobileDrawerOpen) {
                    setMobileDrawerOpen(false); setMobileTab("chat");
                  } else {
                    setMobileTab("threads"); setMobileDrawerOpen(true);
                  }
                }}>
                <span className="mobile-nav-icon">≡</span>
                <span className="mobile-nav-label">THREADS</span>
              </button>
              <button className={`mobile-nav-tab`}
                onClick={reset}>
                <span className="mobile-nav-icon">+</span>
                <span className="mobile-nav-label">NEW</span>
              </button>
              <button className={`mobile-nav-tab ${mobileTab==="debate"?"active":""}`}
                onClick={() => {
                  if (mobileTab === "debate" && mobileDrawerOpen) {
                    setMobileDrawerOpen(false); setMobileTab("chat");
                  } else {
                    setMobileTab("debate"); setMobileDrawerOpen(true);
                  }
                }}>
                <span className="mobile-nav-icon">⚡</span>
                <span className="mobile-nav-label">DEBATE</span>
              </button>
              <button className={`mobile-nav-tab`}
                onClick={() => setShowOnboard(true)}>
                <span className="mobile-nav-icon">?</span>
                <span className="mobile-nav-label">ABOUT</span>
              </button>
            </div>
          </div>

          {/* Mobile drawer */}
          <div className={`mobile-drawer ${mobileDrawerOpen?"open":""}`}>
            <div className="mobile-drawer-backdrop" onClick={() => { setMobileDrawerOpen(false); setMobileTab("chat"); }}/>
            <div className="mobile-drawer-panel">
              {mobileDrawerContent()}
            </div>
          </div>

        </div>
      );
    }

    // CSS variable workaround for JSX
    const var_gold = "var(--gold)";

    // ── App Root ───────────────────────────────────────────────
    function App() {
      const [token, setTokenState] = useState(() => getToken());
      const [isAdmin, setIsAdmin] = useState(() => !!getAdminSecret());
      return token
        ? React.createElement(JarvisInterface, { token, isAdmin, key: token })
        : React.createElement(GuestSessionGate, { onReady: (t, admin = false) => { setTokenState(t); setIsAdmin(!!admin); } });
    }

    ReactDOM.render(React.createElement(App), document.getElementById("root"));
  </script>
</body>
</html>
