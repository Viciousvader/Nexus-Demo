<head>

  <meta property="og:type" content="website"/>

  <meta property="og:description" content="A sovereign swarm of specialized AI agents debate every query in real-time and synthesize a unified, cross-verified response."/>
  <meta property="og:url" content="https://jarvis-ai-arena.netlify.app"/>
  <meta property="og:site_name" content="J.A.R.V.I.S Sovereign Swarm"/>
  <meta name="twitter:card" content="summary_large_image"/>

  <link rel="apple-touch-icon" id="app-icon" href=""/>
  <script>
    (function() {
      var c = document.createElement('canvas');
      c.width = 180; c.height = 180;
      var ctx = c.getContext('2d');
      ctx.fillStyle = '#020c12'; ctx.fillRect(0, 0, 180, 180);
      ctx.beginPath(); ctx.arc(90, 90, 72, 0, Math.PI*2);
      ctx.strokeStyle = 'rgba(0,212,255,0.3)'; ctx.lineWidth = 1.5; ctx.stroke();
      ctx.beginPath(); ctx.arc(90, 90, 55, 0, Math.PI*2);
      ctx.strokeStyle = 'rgba(0,212,255,0.4)'; ctx.lineWidth = 1; ctx.stroke();
      ctx.beginPath(); ctx.arc(90, 90, 38, 0, Math.PI*2);
      ctx.strokeStyle = '#00d4ff'; ctx.lineWidth = 2; ctx.stroke();
      ctx.strokeStyle = 'rgba(0,212,255,0.5)'; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.moveTo(90,20); ctx.lineTo(90,52); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(90,128); ctx.lineTo(90,160); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(20,90); ctx.lineTo(52,90); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(128,90); ctx.lineTo(160,90); ctx.stroke();
      ctx.strokeStyle = 'rgba(0,212,255,0.3)'; ctx.lineWidth = 1;
      [[38,38,58,58],[142,38,122,58],[38,142,58,122],[142,142,122,122]].forEach(([x1,y1,x2,y2])=>{ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();});
      var grad = ctx.createRadialGradient(90,90,0,90,90,22);
      grad.addColorStop(0,'rgba(255,255,255,0.95)'); grad.addColorStop(0.3,'rgba(0,212,255,0.9)');
      grad.addColorStop(0.7,'rgba(0,100,180,0.4)'); grad.addColorStop(1,'transparent');
      ctx.beginPath(); ctx.arc(90,90,22,0,Math.PI*2); ctx.fillStyle=grad; ctx.fill();
      ctx.beginPath(); ctx.arc(90,90,7,0,Math.PI*2); ctx.fillStyle='#ffffff'; ctx.fill();
      ctx.font='bold 13px monospace'; ctx.fillStyle='#00d4ff'; ctx.textAlign='center';
      ctx.fillText('J.A.R.V.I.S',90,158);
      document.getElementById('app-icon').href=c.toDataURL('image/png');
    })();
  </script>
  <title>J.A.R.V.I.S — Multi-Intelligence Interface</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --blue:#00e8ff; --blue-dim:#00aacc; --blue-dark:#001a22;
      --gold:#ffd966; --gold-dim:#c49a20; --red:#ff6666;
      --green:#00ff99; --bg:#020a10; --panel:#041220;
      --border:#0f4a66; --text:#f5f0e8; --text-dim:#a89880;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    html,body{height:100%;background:var(--bg);font-family:'Share Tech Mono',monospace;color:var(--text);overflow-x:hidden;}
    body::before{content:'';position:fixed;inset:0;z-index:0;background-image:linear-gradient(rgba(0,212,255,0.06) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,0.06) 1px,transparent 1px);background-size:40px 40px;animation:gridPulse 8s ease-in-out infinite;}
    body::after{content:'';position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse at 50% 0%,rgba(0,100,180,0.12) 0%,transparent 70%),radial-gradient(ellipse at 100% 100%,rgba(0,40,80,0.15) 0%,transparent 60%);pointer-events:none;}
    @keyframes gridPulse{0%,100%{opacity:0.6}50%{opacity:1}}
    .scanline{position:fixed;top:0;left:0;right:0;height:2px;z-index:1000;background:linear-gradient(90deg,transparent,var(--blue),transparent);opacity:0.4;animation:scan 6s linear infinite;}
    @keyframes scan{from{top:-2px}to{top:100vh}}
    .corner{position:fixed;width:60px;height:60px;z-index:10;pointer-events:none;}
    .corner-tl{top:0;left:0;border-top:2px solid var(--blue);border-left:2px solid var(--blue);}
    .corner-tr{top:0;right:0;border-top:2px solid var(--blue);border-right:2px solid var(--blue);}
    .corner-bl{bottom:0;left:0;border-bottom:2px solid var(--blue);border-left:2px solid var(--blue);}
    .corner-br{bottom:0;right:0;border-bottom:2px solid var(--blue);border-right:2px solid var(--blue);}
    #root{position:relative;z-index:2;height:100vh;display:flex;flex-direction:column;overflow:hidden;}

    /* ── HEADER ── */
    .hud-header{position:sticky;top:0;z-index:100;background:rgba(1,8,14,0.97);border-bottom:1px solid var(--border);padding:10px 6px 10px 16px;display:grid;grid-template-columns:172px minmax(0,1fr) 226px;align-items:center;gap:12px;backdrop-filter:blur(10px);}
.header-rail{display:flex;align-items:center;min-width:0;}
.header-rail-left{justify-content:flex-start;gap:10px;}
.header-rail-right{justify-content:flex-end;gap:10px;padding-right:0;}
.header-brand{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;min-width:0;}
.status-inline{display:flex;align-items:center;gap:8px;font-size:10px;color:#c8b89a;letter-spacing:0.14em;text-transform:uppercase;white-space:nowrap;}
    .hud-header::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--blue),var(--gold),var(--blue),transparent);animation:headerGlow 3s ease-in-out infinite;}
    @keyframes headerGlow{0%,100%{opacity:0.5}50%{opacity:1}}
    .jarvis-title{font-family:'Orbitron',sans-serif;font-size:22px;font-weight:900;letter-spacing:0.3em;color:var(--blue);text-shadow:0 0 20px var(--blue),0 0 40px rgba(0,212,255,0.3);}
    .jarvis-sub{font-size:9px;color:var(--text-dim);letter-spacing:0.4em;text-transform:uppercase;margin-top:3px;}
    .arc-reactor{width:44px;height:44px;border-radius:50%;background:radial-gradient(circle,#fff 0%,var(--blue) 30%,#004466 60%,#001122 100%);box-shadow:0 0 15px var(--blue),0 0 30px rgba(0,212,255,0.4),0 0 60px rgba(0,212,255,0.1);animation:reactorPulse 2s ease-in-out infinite;position:relative;flex-shrink:0;}
    .arc-reactor::after{content:'';position:absolute;inset:6px;border-radius:50%;border:1px solid rgba(255,255,255,0.4);animation:reactorRing 2s linear infinite;}
    @keyframes reactorPulse{0%,100%{box-shadow:0 0 15px var(--blue),0 0 30px rgba(0,212,255,0.4)}50%{box-shadow:0 0 25px var(--blue),0 0 50px rgba(0,212,255,0.6),0 0 80px rgba(0,212,255,0.2)}}
    @keyframes reactorRing{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
    .status-bar{display:flex;gap:16px;align-items:center;font-size:10px;color:#c8b89a;letter-spacing:0.1em;}
    .status-dot{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green);animation:statusBlink 2s ease-in-out infinite;display:inline-block;margin-right:6px;}
    @keyframes statusBlink{0%,100%{opacity:1}50%{opacity:0.3}}
    .panel-toggle-btn{background:transparent;border:1px solid #2a2a3a;color:#334455;font-size:8px;padding:4px 10px;cursor:pointer;font-family:'Share Tech Mono',monospace;border-radius:2px;letter-spacing:0.08em;transition:all 0.15s;}
    .panel-toggle-btn:hover{border-color:#00d4ff;color:#00d4ff;}
    .panel-toggle-btn.on{border-color:#00d4ff;color:#00d4ff;background:rgba(0,212,255,0.06);}

    /* ── THREE PANEL BODY ── */
    .three-panel-body{flex:1;display:flex;overflow:hidden;}

    /* ── THREAD SIDEBAR ── */
    .thread-sidebar{width:172px;background:#080810;border-right:1px solid #1a1a2a;display:flex;flex-direction:column;flex-shrink:0;overflow:hidden;transition:width 0.25s ease;}
    .thread-sidebar.collapsed{width:0;border-right:none;}
    .sb-hdr{padding:9px 10px;border-bottom:1px solid #1a1a2a;flex-shrink:0;}
    .sb-title{color:#ffc844;font-size:8px;letter-spacing:0.22em;font-family:'Orbitron',sans-serif;}
    .new-query-btn{width:calc(100% - 16px);margin:8px;background:transparent;border:1px solid #ffc844;color:#ffc844;font-size:8px;padding:7px 0;cursor:pointer;font-family:'Share Tech Mono',monospace;border-radius:2px;letter-spacing:0.1em;text-align:center;flex-shrink:0;transition:all 0.15s;}
    .new-query-btn:hover{background:#1a1400;}
    .sb-thread-list{flex:1;overflow-y:auto;}
    .sb-thread-list::-webkit-scrollbar{width:2px;}
    .sb-thread-list::-webkit-scrollbar-thumb{background:#2a2a3a;}
    .sb-t-item{padding:8px 10px;border-bottom:1px solid #0c0c18;cursor:pointer;transition:all 0.15s;}
    .sb-t-item:hover{background:#0c0c1a;}
    .sb-t-item.active{background:#0a0a18;border-left:2px solid #00d4ff;padding-left:8px;}
    .sb-t-title{font-size:9px;color:#00d4ff;line-height:1.35;opacity:0.55;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .sb-t-item.active .sb-t-title{opacity:1;}
    .sb-t-item:hover .sb-t-title{opacity:0.85;}
    .sb-t-meta{font-size:7px;color:#1a2233;margin-top:2px;letter-spacing:0.08em;}

    /* ── CHAT COLUMN ── */
    .chat-col{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;position:relative;}
    .chat-scroll-area{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:16px;}
    .chat-scroll-area::-webkit-scrollbar{width:3px;}
    .chat-scroll-area::-webkit-scrollbar-thumb{background:#2a2a3a;}

    /* ── WELCOME SCREEN ── */
    .chat-welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:24px;text-align:center;padding:32px 20px;}
    .chat-welcome-title{font-family:'Orbitron',sans-serif;font-size:11px;color:#00d4ff;letter-spacing:0.3em;opacity:0.7;}
    .chat-welcome-sub{font-size:11px;color:#445566;letter-spacing:0.06em;line-height:2;}
    .welcome-samples{display:flex;flex-direction:column;gap:8px;width:100%;max-width:480px;margin-top:8px;}
    .welcome-sample-btn{background:rgba(0,30,50,0.7);border:1px solid #1a4a60;color:#c8b89a;padding:10px 16px;border-radius:3px;font-family:'Share Tech Mono',monospace;font-size:11px;cursor:pointer;transition:all 0.2s;letter-spacing:0.04em;text-align:left;}
    .welcome-sample-btn:hover{border-color:#00e8ff;color:#00e8ff;background:rgba(0,232,255,0.06);}

    /* ── CHAT MESSAGES ── */
    .chat-u-msg{align-self:flex-end;background:#0d0d18;border:1px solid #1a1a3a;border-radius:4px;padding:10px 14px;max-width:75%;animation:fadeSlide 0.3s ease;}
    .chat-u-msg p{color:#ffc844;font-size:12px;font-style:italic;line-height:1.5;}
    .chat-j-msg{width:100%;animation:fadeSlide 0.4s ease;}

    /* ── AGENT HEALTH CARDS ── */
    .health-dashboard{padding:8px 14px;}
    .health-grid{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px;}
    .health-card{flex:1 1 120px;background:rgba(0,10,20,0.6);border:1px solid #0a3a50;border-radius:3px;padding:8px 12px;border-left-width:3px;border-left-style:solid;transition:all 0.3s;}
    .health-card.online{border-left-color:#00ff88;}
    .health-card.bypassed{border-left-color:#ff6b6b;opacity:0.7;}
    .health-card.pending{border-left-color:#a89880;opacity:0.5;}
    .health-card.processing{border-left-color:#00e8ff;animation:cardProcessing 1.2s ease-in-out infinite;}
    .health-card.complete{border-left-color:#00ff88;opacity:1;}
    @keyframes cardProcessing{0%,100%{background:rgba(0,10,20,0.6)}50%{background:rgba(0,30,50,0.8)}}
    .health-name{font-family:'Orbitron',sans-serif;font-size:9px;font-weight:700;margin-bottom:2px;}
    .health-company{font-size:8px;color:#a89880;margin-bottom:5px;}
    .health-status{font-size:9px;display:flex;align-items:center;gap:5px;}
    .health-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;}
    .health-dot.online{background:#00ff88;box-shadow:0 0 6px #00ff88;animation:statusBlink 2s infinite;}
    .health-dot.bypassed{background:#ff6b6b;box-shadow:0 0 6px #ff6b6b;}
    .health-dot.pending{background:#a89880;}
    .health-dot.processing{background:#00e8ff;box-shadow:0 0 6px #00e8ff;animation:statusBlink 0.8s infinite;}
    .health-dot.complete{background:#00ff88;box-shadow:0 0 6px #00ff88;}

    /* ── PROCESSING STATE ── */
    .swarm-processing{padding:16px 22px;background:rgba(0,20,35,0.6);border:1px solid #0f3a50;border-left:3px solid #00e8ff;border-radius:3px;animation:fadeSlide 0.4s ease;}
    .swarm-processing-label{font-family:'Orbitron',sans-serif;font-size:9px;color:#00e8ff;letter-spacing:0.3em;margin-bottom:8px;}
    .swarm-dots{display:flex;gap:6px;align-items:center;}
    .swarm-dot{width:6px;height:6px;border-radius:50%;background:#00e8ff;animation:dotPulse 1.4s ease-in-out infinite;}
    .swarm-dot:nth-child(2){animation-delay:0.2s;}
    .swarm-dot:nth-child(3){animation-delay:0.4s;}
    @keyframes dotPulse{0%,80%,100%{opacity:0.2;transform:scale(0.8)}40%{opacity:1;transform:scale(1)}}

    /* ── CONFIDENCE BADGE ── */
    .conf-compact{display:inline-flex;align-items:center;gap:5px;padding:2px 8px;border-radius:2px;white-space:nowrap;flex-shrink:0;}
    .conf-compact.high{border:1px solid #1a3a1a;background:#0a1f0a;}
    .conf-compact.moderate{border:1px solid #3a3000;background:#1a1400;}
    .conf-compact.low{border:1px solid #3a1a1a;background:#1a0a0a;}
    .conf-diamond-sm{width:6px;height:6px;transform:rotate(45deg);flex-shrink:0;}
    .conf-diamond-sm.high{background:#00cc44;}
    .conf-diamond-sm.moderate{background:#ffc844;}
    .conf-diamond-sm.low{background:#ff6b6b;}
    .conf-label-sm{font-size:8px;letter-spacing:0.1em;}
    .conf-label-sm.high{color:#00cc44;}
    .conf-label-sm.moderate{color:#ffc844;}
    .conf-label-sm.low{color:#ff6b6b;}

    /* ── SYNTHESIS PANEL ── */
    .synthesis-panel{margin-top:6px;padding:20px 22px;background:rgba(20,12,0,0.8);border:1px solid #4a3a00;border-top:3px solid var(--gold);border-radius:3px;animation:fadeSlide 0.5s ease;}
    .synthesis-label{font-family:'Orbitron',sans-serif;font-size:10px;font-weight:700;color:var(--gold);letter-spacing:0.35em;text-transform:uppercase;margin-bottom:14px;text-shadow:0 0 10px rgba(255,200,68,0.5);}
    .synthesis-text{font-size:14px;line-height:1.95;color:#ffe87a;}
    .synthesis-section{margin-bottom:16px;}
    .synthesis-section:last-child{margin-bottom:0;}
    .synthesis-section-title{font-family:'Orbitron',sans-serif;font-size:9px;font-weight:700;color:var(--gold);letter-spacing:0.25em;text-transform:uppercase;opacity:0.85;margin-bottom:6px;}
    .synthesis-section-body{font-size:14px;line-height:1.85;color:#ffe87a;white-space:pre-wrap;}
    .synthesis-section-body ul{margin:6px 0 6px 18px;padding:0;}
    .synthesis-section-body li{margin-bottom:4px;list-style:disc;}
    .synthesis-code-block{background:#080810;border:1px solid #1a1a2a;border-left:3px solid #00e8ff;border-radius:3px;padding:14px 16px;font-size:12px;color:#b0bcc8;line-height:1.7;overflow-x:auto;white-space:pre;font-family:'Share Tech Mono',monospace;margin:8px 0;position:relative;}
    .section-copy-btn{background:transparent;border:1px solid #2a3a20;color:#445566;font-size:8px;padding:2px 8px;border-radius:2px;cursor:pointer;font-family:'Share Tech Mono',monospace;transition:all 0.2s;flex-shrink:0;}
    .section-copy-btn:hover{border-color:#00d4ff;color:#00d4ff;}
    .section-copy-btn.copied{border-color:#00ff88;color:#00ff88;}

    /* ── QUORUM FAILURE ── */
    .quorum-panel{padding:20px 22px;background:rgba(28,0,0,0.8);border:1px solid #4a0000;border-top:3px solid #ff6b6b;border-radius:3px;animation:fadeSlide 0.5s ease;}
    .quorum-label{font-family:'Orbitron',sans-serif;font-size:10px;font-weight:700;color:#ff6b6b;letter-spacing:0.35em;margin-bottom:10px;}
    .quorum-text{font-size:13px;line-height:1.8;color:#ff9999;}

    /* ── COPY BTN ── */
    .copy-btn{background:transparent;border:1px solid #1a3a50;color:#445566;font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:0.1em;padding:3px 8px;border-radius:2px;cursor:pointer;transition:all 0.2s;flex-shrink:0;}
    .copy-btn:hover{border-color:#00d4ff;color:#00d4ff;}
    .copy-btn.copied{border-color:#00ff88;color:#00ff88;}

    /* ── THREAD ACTIVE BAR ── */
    .thread-active-bar{font-size:8px;color:#00d4ff;letter-spacing:0.1em;padding:4px 14px;background:rgba(0,212,255,0.04);border-bottom:1px solid #1a1a2a;flex-shrink:0;opacity:0.7;}

    /* ── MODE BAR ── */
    .mode-bar{padding:6px 14px 4px 60px;background:#0a0a0f;flex-shrink:0;border-top:1px solid #0f0f1a;}
    .mode-bar-label{font-size:7px;color:#1a2a3a;letter-spacing:0.18em;margin-bottom:4px;}
    .mode-btns{display:flex;gap:5px;}
    .mode-btn{padding:5px 12px;border:1px solid #2a2a3a;background:transparent;color:#445566;font-size:8px;font-family:'Share Tech Mono',monospace;letter-spacing:0.08em;cursor:pointer;border-radius:2px;transition:all 0.15s;}
    .mode-btn:hover{border-color:#667788;color:#8899aa;}
    .mode-btn.m-auto{border-color:#ffc844;color:#ffc844;background:rgba(255,200,68,0.06);}
    .mode-btn.m-focused{border-color:#00d4ff;color:#00d4ff;background:rgba(0,212,255,0.06);}
    .mode-btn.m-dual{border-color:#a070ff;color:#a070ff;background:rgba(160,112,255,0.06);}

    /* ── INPUT ROW ── */
    .chat-input-row{padding:8px 14px 10px;background:#0d0d14;border-top:1px solid #1a1a2a;display:flex;gap:8px;align-items:flex-end;flex-shrink:0;}
    .chat-text-input{flex:1;min-width:0;background:#0a0a14;border:1px solid #1a1a2a;color:#e0e8f0;padding:8px 12px;font-family:'Share Tech Mono',monospace;font-size:13px;border-radius:3px;min-height:38px;outline:none;transition:border-color 0.2s;resize:none;overflow-x:hidden;overflow-y:hidden;line-height:1.5;overflow-wrap:break-word;word-break:break-word;white-space:pre-wrap;}
    .chat-text-input:focus{border-color:#0099bb;}
    .chat-text-input::placeholder{color:#2a2a3a;}
    .chat-send-btn{background:#ffc844;color:#0a0800;border:none;padding:0 18px;font-family:'Orbitron',sans-serif;font-size:9px;font-weight:700;cursor:pointer;border-radius:3px;height:38px;letter-spacing:0.1em;transition:all 0.15s;white-space:nowrap;}
    .chat-send-btn:hover{background:#ffd966;box-shadow:0 0 12px rgba(255,200,68,0.3);}
    .chat-send-btn:disabled{opacity:0.35;cursor:default;}
    .attach-btn{background:transparent;border:1px solid #1a1a2a;color:#445566;font-size:14px;width:38px;height:38px;border-radius:3px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s;flex-shrink:0;}
    .attach-btn:hover{border-color:#00d4ff;color:#00d4ff;}
    .attach-btn.loaded{border-color:#00ff88;color:#00ff88;}
    .file-pill{display:flex;align-items:center;gap:6px;background:rgba(0,255,136,0.06);border:1px solid #00ff8844;border-radius:3px;padding:0 8px;height:38px;font-size:9px;color:#00ff88;font-family:'Share Tech Mono',monospace;flex-shrink:0;max-width:140px;}
    .file-pill-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:90px;}
    .file-pill-clear{background:transparent;border:none;color:#ff6b6b;cursor:pointer;font-size:11px;padding:0;line-height:1;flex-shrink:0;}

    /* ── DEBATE PANEL ── */
    .debate-panel{width:226px;background:#080810;border-left:1px solid #1a1a2a;display:flex;flex-direction:column;flex-shrink:0;overflow:hidden;transition:width 0.25s ease;}
    .debate-panel.collapsed{width:0;border-left:none;}
    .d-hdr{padding:9px 10px;border-bottom:1px solid #1a1a2a;flex-shrink:0;}
    .d-title{color:#ffc844;font-size:8px;letter-spacing:0.22em;font-family:'Orbitron',sans-serif;}
    .d-sub{color:#00d4ff;font-size:7px;letter-spacing:0.1em;margin-top:2px;opacity:0.45;}
    .turn-wrap{position:relative;padding:6px 8px;border-bottom:1px solid #1a1a2a;flex-shrink:0;}
    .turn-strip{display:flex;gap:4px;overflow-x:auto;scroll-behavior:smooth;scrollbar-width:none;cursor:grab;user-select:none;-webkit-user-select:none;touch-action:pan-x;}
    .turn-strip.dragging{cursor:grabbing;}
    .turn-strip::-webkit-scrollbar{display:none;}
    .t-pill{flex-shrink:0;width:52px;padding:4px 0;border:1px solid rgba(0,212,255,0.25);color:#00d4ff;font-size:8px;font-family:'Share Tech Mono',monospace;text-align:center;cursor:pointer;border-radius:2px;letter-spacing:0.06em;background:transparent;transition:all 0.15s;opacity:0.55;}
    .t-pill:hover{border-color:#00d4ff;opacity:0.9;background:rgba(0,212,255,0.05);}
    .t-pill.active{border-color:#00d4ff;background:rgba(0,212,255,0.08);opacity:1;}
    .fade-r-d{position:absolute;right:8px;top:6px;bottom:6px;width:16px;background:linear-gradient(to right,transparent,#080810);pointer-events:none;}
    .fade-l-d{position:absolute;left:8px;top:6px;bottom:6px;width:16px;background:linear-gradient(to left,transparent,#080810);pointer-events:none;opacity:0;}
    .d-scroll{flex:1;overflow-y:auto;padding:8px;}
    .d-scroll::-webkit-scrollbar{width:2px;}
    .d-scroll::-webkit-scrollbar-thumb{background:#2a2a3a;}
    .d-empty{color:#334455;font-size:9px;text-align:center;margin-top:24px;line-height:1.8;}
    .d-block{margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid #0c0c18;}
    .d-block:last-child{border-bottom:none;margin-bottom:0;}
    .d-agent-nm{font-size:8px;letter-spacing:0.12em;margin-bottom:3px;font-family:'Orbitron',sans-serif;}
    .d-text{font-size:11px;color:#b0bcc8;line-height:1.6;}
    .d-q-label{font-size:8px;color:#00d4ff;font-style:italic;opacity:0.45;border-left:1px solid #1a1a2a;padding-left:6px;margin-bottom:8px;line-height:1.4;}
    .debate-copy-btn{background:transparent;border:1px solid #1a3a50;color:#445566;font-size:8px;padding:2px 8px;border-radius:2px;cursor:pointer;font-family:'Share Tech Mono',monospace;transition:all 0.2s;flex-shrink:0;}
    .debate-copy-btn:hover{border-color:#00d4ff;color:#00d4ff;}
    .debate-copy-btn.copied{border-color:#00ff88;color:#00ff88;}
    .d-agent-row{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:3px;}


    /* ── SCROLL TO TOP ── */
    .scroll-top-btn{position:fixed;bottom:80px;right:16px;z-index:300;width:38px;height:38px;border-radius:50%;background:#041220;border:1px solid var(--border);color:var(--blue);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s;box-shadow:0 0 12px rgba(0,212,255,0.15);opacity:0;pointer-events:none;}
    .scroll-top-btn.visible{opacity:1;pointer-events:all;}
    .scroll-top-btn:hover{background:rgba(0,212,255,0.1);box-shadow:0 0 20px rgba(0,212,255,0.3);}

    /* ── PIN GATE ── */
    .pin-overlay{position:fixed;inset:0;z-index:500;background:rgba(2,10,16,0.97);display:flex;align-items:center;justify-content:center;backdrop-filter:blur(10px);animation:fadeSlide 0.3s ease;}
    .pin-box{background:#041220;border:1px solid #0f4a66;border-top:3px solid #00e8ff;border-radius:4px;padding:36px 32px;width:100%;max-width:380px;text-align:center;}
    .pin-title{font-family:'Orbitron',sans-serif;font-size:13px;font-weight:900;color:#00e8ff;letter-spacing:0.3em;margin-bottom:6px;text-shadow:0 0 20px #00e8ff;}
    .pin-sub{font-size:11px;color:#a89880;letter-spacing:0.1em;margin-bottom:24px;}
    .pin-dots{display:flex;gap:12px;justify-content:center;margin-bottom:24px;}
    .pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid #0f4a66;background:transparent;transition:all 0.2s;}
    .pin-dot.filled{background:#00e8ff;border-color:#00e8ff;box-shadow:0 0 10px #00e8ff;}
    .pin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px;}
    .pin-key{font-family:'Orbitron',sans-serif;font-size:16px;font-weight:700;padding:16px;background:#071a28;border:1px solid #0f4a66;border-radius:3px;color:#f5f0e8;cursor:pointer;transition:all 0.15s;}
    .pin-key:hover{background:rgba(0,232,255,0.1);border-color:#00e8ff;color:#00e8ff;}
    .pin-key:active{transform:scale(0.95);}
    .pin-clear{font-family:'Orbitron',sans-serif;font-size:10px;font-weight:700;letter-spacing:0.2em;padding:12px;background:transparent;border:1px solid #2a1a0a;border-radius:3px;color:#a89880;cursor:pointer;transition:all 0.2s;}
    .pin-clear:hover{border-color:#ff6b6b;color:#ff6b6b;}
    .pin-error{color:#ff6b6b;font-size:11px;margin-top:12px;letter-spacing:0.1em;animation:shake 0.3s ease;}
    @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}

    /* ── ONBOARDING OVERLAY ── */
    .onboard-overlay{position:fixed;inset:0;z-index:450;background:rgba(2,10,16,0.96);display:flex;align-items:center;justify-content:center;backdrop-filter:blur(10px);animation:fadeSlide 0.4s ease;}
    .onboard-box{background:#041220;border:1px solid #0f4a66;border-top:3px solid var(--gold);border-radius:4px;padding:40px 36px;width:100%;max-width:480px;text-align:center;}
    .onboard-title{font-family:'Orbitron',sans-serif;font-size:20px;font-weight:900;color:var(--gold);letter-spacing:0.25em;margin-bottom:8px;text-shadow:0 0 20px rgba(255,200,68,0.4);}
    .onboard-sub{font-size:10px;color:var(--text-dim);letter-spacing:0.25em;margin-bottom:28px;}
    .onboard-agents{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:28px;}
    .onboard-agent{background:rgba(0,10,20,0.6);border:1px solid #0f3a50;border-radius:3px;padding:12px 14px;text-align:left;}
    .onboard-agent-name{font-family:'Orbitron',sans-serif;font-size:9px;font-weight:700;letter-spacing:0.15em;margin-bottom:3px;}
    .onboard-agent-desc{font-size:9px;color:#a89880;line-height:1.5;}
    .onboard-desc{font-size:12px;color:#c8b89a;line-height:1.8;margin-bottom:28px;}
    .onboard-btn{font-family:'Orbitron',sans-serif;font-size:11px;font-weight:700;letter-spacing:0.2em;padding:14px 32px;background:var(--gold);color:#0a0800;border:none;border-radius:3px;cursor:pointer;transition:all 0.2s;width:100%;}
    .onboard-btn:hover{background:#ffd966;box-shadow:0 0 20px rgba(255,200,68,0.4);}

    /* ── MOBILE BOTTOM NAV ── */
    .mobile-bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;z-index:400;background:rgba(4,18,32,0.98);border-top:1px solid #0f4a66;backdrop-filter:blur(10px);}
    .mobile-nav-tabs{display:flex;}
    .mobile-nav-tab{flex:1;padding:10px 4px 8px;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;transition:all 0.2s;border:none;background:transparent;color:#334455;font-family:'Orbitron',sans-serif;font-size:6px;letter-spacing:0.15em;}
    .mobile-nav-tab.active{color:#00e8ff;}
    .mobile-nav-tab:hover{color:#667788;}
    .mobile-nav-icon{font-size:16px;line-height:1;}
    .mobile-nav-label{font-size:6px;letter-spacing:0.1em;}

    /* ── MOBILE DRAWER ── */
    .mobile-drawer{position:fixed;inset:0;z-index:350;pointer-events:none;}
    .mobile-drawer-backdrop{position:absolute;inset:0;background:rgba(0,0,0,0.7);opacity:0;transition:opacity 0.3s;pointer-events:none;}
    .mobile-drawer.open .mobile-drawer-backdrop{opacity:1;pointer-events:all;}
    .mobile-drawer-panel{position:absolute;bottom:56px;left:0;right:0;background:#041220;border-top:2px solid var(--border);max-height:70vh;display:flex;flex-direction:column;transform:translateY(100%);transition:transform 0.3s ease;pointer-events:none;}
    .mobile-drawer.open .mobile-drawer-panel{pointer-events:all;}
    .mobile-drawer.open .mobile-drawer-panel{transform:translateY(0);}
    .mobile-drawer-header{padding:12px 16px;border-bottom:1px solid #1a1a2a;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
    .mobile-drawer-title{font-family:'Orbitron',sans-serif;font-size:10px;color:#00e8ff;letter-spacing:0.25em;}
    .mobile-drawer-close{background:transparent;border:1px solid #1a3a50;color:#a89880;padding:4px 10px;border-radius:2px;cursor:pointer;font-family:'Share Tech Mono',monospace;font-size:10px;}
    .mobile-drawer-close:hover{border-color:#ff6b6b;color:#ff6b6b;}
    .mobile-drawer-content{flex:1;overflow-y:auto;padding:12px;}

    /* ── HISTORY PANEL (legacy) ── */
    .history-panel{position:fixed;top:0;right:0;bottom:0;width:340px;z-index:200;background:#030d16;border-left:1px solid #0f4a66;display:flex;flex-direction:column;box-shadow:-10px 0 40px rgba(0,0,0,0.5);animation:slideIn 0.3s ease;}
    @keyframes slideIn{from{transform:translateX(100%)}to{transform:translateX(0)}}
    .history-header{padding:16px 20px;border-bottom:1px solid #0f4a66;display:flex;align-items:center;justify-content:space-between;background:#041220;}
    .history-title{font-family:'Orbitron',sans-serif;font-size:11px;font-weight:700;color:#00e8ff;letter-spacing:0.25em;}
    .history-close{background:transparent;border:1px solid #0f4a66;color:#a89880;padding:5px 12px;border-radius:3px;cursor:pointer;font-family:'Share Tech Mono',monospace;font-size:11px;}
    .history-close:hover{border-color:#ff6b6b;color:#ff6b6b;}
    .history-list{flex:1;overflow-y:auto;padding:12px;}
    .history-item{background:#071a28;border:1px solid #0f4a66;border-left:3px solid #00e8ff;border-radius:3px;padding:12px 14px;margin-bottom:8px;cursor:pointer;transition:all 0.2s;}
    .history-item:hover{border-color:#00e8ff;background:rgba(0,232,255,0.05);}
    .history-item-q{font-size:12px;color:#f5f0e8;line-height:1.5;margin-bottom:4px;}
    .history-item-meta{font-size:10px;color:#a89880;display:flex;gap:10px;align-items:center;}
    .history-item-del{float:right;background:transparent;border:none;color:#3a3a3a;cursor:pointer;font-size:12px;padding:0 4px;}
    .history-item-del:hover{color:#ff6b6b;}

    /* ── ANIMATIONS ── */
    @keyframes fadeSlide{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}

    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar{width:4px;}
    ::-webkit-scrollbar-track{background:var(--bg);}
    ::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

    /* ── DESKTOP MEDIA ── */
    @media(min-width:601px){
      .mobile-bottom-nav{display:none !important;}
      .mobile-drawer{display:none !important;}
      .scroll-top-btn{bottom:20px;}
    }

    /* ── MOBILE MEDIA ── */
    @media(max-width:600px){
      .jarvis-title{font-size:17px;letter-spacing:0.2em;}
      .jarvis-sub{font-size:8px;letter-spacing:0.2em;}
      .hud-header{grid-template-columns:minmax(0,1fr) auto;grid-template-areas:"brand reactor";gap:8px;}
      .header-rail{display:none;}
      .header-brand{grid-area:brand;align-items:flex-start;text-align:left;}
      .arc-reactor{grid-area:reactor;justify-self:end;}
      .status-bar{display:none;}
      .thread-sidebar{display:none !important;}
      .debate-panel{display:none !important;}
      .mobile-bottom-nav{display:block;}
      .three-panel-body{margin-bottom:56px;}
      .chat-scroll-area{padding:12px 10px;}
      .chat-u-msg{max-width:88%;}
      .chat-u-msg p{font-size:13px;}
      .synthesis-text{font-size:13px;}
      .synthesis-section-body{font-size:13px;}
      .synthesis-section-title{font-size:8px;}
      .health-grid{gap:6px;}
      .health-card{flex:1 1 100px;padding:7px 10px;}
      .health-name{font-size:8px;}
      .health-company{font-size:7px;}
      .chat-text-input{font-size:14px;}
      .mode-btn{padding:5px 8px;font-size:7px;}
      .scroll-top-btn{bottom:68px;right:12px;width:34px;height:34px;font-size:14px;}
      .hud-header{padding:8px 4px 8px 12px;}
      .arc-reactor{width:36px;height:36px;}
      .health-dashboard{padding:6px 10px;}
    }
  </style>
</head>
<body>
  <div class="scanline"></div>
  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>
  <div id="root"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

  <script type="text/babel">
    const { useState, useRef, useEffect, useCallback } = React;

    const ADMIN_TOGGLE_KEY = "jarvis_admin_secret";

    const AGENT_UI = [
      { key:"analyst",  name:"ANALYST",   company:"OPENAI · GPT-4O MINI",        color:"#ffc844", avatar:"AN", bg:"rgba(30,18,0,0.7)"  },
      { key:"adversary",name:"ADVERSARY", company:"DEEPSEEK · CHAT V3",          color:"#00d4ff", avatar:"AV", bg:"rgba(0,18,28,0.7)"  },
      { key:"auditor",  name:"AUDITOR",   company:"GOOGLE · GEMINI 2.0 FLASH",   color:"#ff6b6b", avatar:"AU", bg:"rgba(28,0,0,0.7)"   },
      { key:"jarvis",   name:"J.A.R.V.I.S",company:"ANTHROPIC · CLAUDE HAIKU",  color:"#ffd966", avatar:"JV", bg:"rgba(20,12,0,0.8)"  },
    ];

    const SAMPLES = [
      "Is democracy the best system of governance?",
      "What is consciousness and can AI achieve it?",
      "Is nuclear power the answer to climate change?",
      "Does free will exist in a deterministic universe?",
      "What is the most important invention in history?",
      "Should AI development be regulated by governments?",
    ];

    // ── API Helpers ────────────────────────────────────────────
    async function callJarvis(payload) {
      const res = await fetch("https://nexus-demo-production-1512.up.railway.app/api/jarvis", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload),
      });
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.error || `HTTP ${res.status}`);
      }
      return res.json();
    }

    function getToken() { try { return localStorage.getItem("jarvis_token"); } catch { return null; } }
    function setToken(t) { try { localStorage.setItem("jarvis_token", t); } catch {} }
    function clearToken() { try { localStorage.removeItem("jarvis_token"); localStorage.removeItem("jarvis_pin_ok"); } catch {} }
    function getAdminSecret() { try { return localStorage.getItem(ADMIN_TOGGLE_KEY); } catch { return null; } }
    function setAdminSecret(secret) { try { localStorage.setItem(ADMIN_TOGGLE_KEY, secret); } catch {} }
    function clearAdminSecret() { try { localStorage.removeItem(ADMIN_TOGGLE_KEY); } catch {} }
    function getOnboardDone() { try { return localStorage.getItem("jarvis_onboard_done"); } catch { return null; } }
    function setOnboardDone() { try { localStorage.setItem("jarvis_onboard_done", "1"); } catch {} }

    // ── PIN Gate ───────────────────────────────────────────────
    async function createGuestSession() {
      const result = await callJarvis({ action: "create_guest_session" });
      if (!result || !result.token) throw new Error("Guest session was not created.");
      return { token: result.token, isAdmin: !!result.isAdmin };
    }

    async function createAdminSession(adminSecret) {
      const result = await callJarvis({ action: "create_admin_session", adminSecret });
      if (!result || !result.token) throw new Error("Admin session was not created.");
      return { token: result.token, isAdmin: !!result.isAdmin };
    }

    // ── Guest Session Gate ─────────────────────────────────────
    function GuestSessionGate({ onReady }) {
      const [statusText, setStatusText] = useState("ESTABLISHING GUEST SESSION...");
      const [errorText, setErrorText] = useState("");

      useEffect(() => {
        let cancelled = false;

        (async () => {
          try {
            const storedAdminSecret = getAdminSecret();
            const session = storedAdminSecret
              ? await createAdminSession(storedAdminSecret).catch(() => null)
              : null;
            const nextSession = session || await createGuestSession();
            setToken(nextSession.token);
            if (!cancelled) onReady(nextSession.token, !!nextSession.isAdmin);
          } catch (err) {
            if (cancelled) return;
            setErrorText("⚠ DEMO BACKEND UNAVAILABLE");
            setStatusText("Refresh and retry in a moment.");
          }
        })();

        return () => { cancelled = true; };
      }, []);

      return (
        <div className="pin-overlay">
          <div className="pin-box">
            <div className="pin-title">J.A.R.V.I.S</div>
            <div className="pin-sub">PUBLIC DEMO ACCESS</div>
            <div style={{color:"#c8b89a",fontSize:11,lineHeight:1.8,marginBottom:18}}>
              {getAdminSecret() ? "Attempting admin session..." : "Launching a temporary guest session so anyone can use the demo immediately."}
            </div>
            <div style={{color:errorText ? "#ff6b6b" : "#00e8ff",fontSize:11,letterSpacing:"0.12em"}}>
              {errorText || statusText}
            </div>
          </div>
        </div>
      );
    }

    // ── Onboarding Overlay ─────────────────────────────────────
    function OnboardOverlay({ onDone }) {
      return (
        <div className="onboard-overlay">
          <div className="onboard-box">
            <div className="onboard-title">J.A.R.V.I.S</div>
            <div className="onboard-sub">SOVEREIGN SWARM INTELLIGENCE</div>
            <div className="onboard-desc">
              Ask any question. Four specialized AI agents debate it in real-time — then JARVIS synthesizes a single, cross-verified answer with a confidence score.
            </div>
            <div className="onboard-agents">
              <div className="onboard-agent">
                <div className="onboard-agent-name" style={{color:"#ffc844"}}>ANALYST</div>
                <div className="onboard-agent-desc">Defines the question and stakes the strongest direct answer.</div>
              </div>
              <div className="onboard-agent">
                <div className="onboard-agent-name" style={{color:"#00d4ff"}}>ADVERSARY</div>
                <div className="onboard-agent-desc">Attacks the Analyst's position and finds what it missed.</div>
              </div>
              <div className="onboard-agent">
                <div className="onboard-agent-name" style={{color:"#ff6b6b"}}>AUDITOR</div>
                <div className="onboard-agent-desc">Fact-checks both agents and rates the debate quality.</div>
              </div>
              <div className="onboard-agent">
                <div className="onboard-agent-name" style={{color:"#ffd966"}}>J.A.R.V.I.S</div>
                <div className="onboard-agent-desc">Synthesizes all inputs into one decisive final answer.</div>
              </div>
            </div>
            <button className="onboard-btn" onClick={onDone}>
              INITIATE SWARM ◈
            </button>
          </div>
        </div>
      );
    }

    // ── Confidence Badge ───────────────────────────────────────
    function ConfidenceBadge({ confidence }) {
      if (!confidence) return null;
      const cls = confidence === "HIGH" ? "high" : confidence === "MODERATE" ? "moderate" : "low";
      const icon = confidence === "HIGH" ? "◈" : confidence === "MODERATE" ? "◇" : "⚠";
      return (
        <div className={`confidence-badge ${cls}`} style={{display:"inline-flex",alignItems:"center",gap:6,padding:"4px 12px",borderRadius:2,fontFamily:"Orbitron,sans-serif",fontSize:9,fontWeight:700,letterSpacing:"0.2em",marginBottom:14}}>
          {icon} CONFIDENCE: {confidence}
        </div>
      );
    }

    // ── Synthesis Formatter ────────────────────────────────────
    const SECTION_HEADERS = [
      "DIRECT ANSWER",
      "WHY THIS IS THE BEST ANSWER",
      "STRONGEST OBJECTION",
      "FINAL JUDGMENT",
      "CONFIDENCE",
    ];

    // ── Section Copy Button ───────────────────────────────────
    function SectionCopyBtn({ textToCopy }) {
      const [copied, setCopied] = useState(false);
      const handleCopy = () => {
        navigator.clipboard.writeText(textToCopy.trim()).then(() => {
          setCopied(true);
          setTimeout(() => setCopied(false), 2000);
        });
      };
      return React.createElement("button", {
        className: `section-copy-btn ${copied ? "copied" : ""}`,
        onClick: handleCopy,
      }, copied ? "✓ COPIED" : "◈ COPY");
    }

    function DebateCopyBtn({ textToCopy }) {
      const [copied, setCopied] = useState(false);
      const handleCopy = () => {
        navigator.clipboard.writeText((textToCopy || "").trim()).then(() => {
          setCopied(true);
          setTimeout(() => setCopied(false), 2000);
        });
      };
      return React.createElement("button", {
        className: `debate-copy-btn ${copied ? "copied" : ""}`,
        onClick: handleCopy,
      }, copied ? "✓ COPIED" : "COPY");
    }

    // ── Parse body into elements — handles bullets, code blocks, paragraphs ──
    function parseBodyElements(body) {
      const elements = [];
      let bulletBuffer = [];
      let codeBuffer = [];
      let inCode = false;

      const flushBullets = () => {
        if (bulletBuffer.length > 0) {
          elements.push(React.createElement("ul", { key: `ul-${elements.length}` },
            bulletBuffer.map((b, bi) => React.createElement("li", { key: bi }, b))
          ));
          bulletBuffer = [];
        }
      };

      const flushCode = () => {
        if (codeBuffer.length > 0) {
          const codeText = codeBuffer.join("\n");
          elements.push(
            React.createElement("div", { key: `code-${elements.length}`, style: { position: "relative" } },
              React.createElement("div", { className: "synthesis-code-block" }, codeText),
              React.createElement("div", { style: { position: "absolute", top: 8, right: 8 } },
                React.createElement(SectionCopyBtn, { textToCopy: codeText })
              )
            )
          );
          codeBuffer = [];
        }
      };

      const lines = body.split("\n");
      lines.forEach((line, li) => {
        const trimmed = line.trim();

        // Code fence detection
        if (trimmed.startsWith("```")) {
          if (inCode) {
            flushCode();
            inCode = false;
          } else {
            flushBullets();
            inCode = true;
          }
          return;
        }

        if (inCode) {
          codeBuffer.push(line);
          return;
        }

        // Inline code block — single backtick lines treated as code
        if (trimmed.startsWith("`") && trimmed.endsWith("`") && trimmed.length > 2) {
          flushBullets();
          const codeText = trimmed.slice(1, -1);
          elements.push(
            React.createElement("div", { key: `icode-${li}`, style: { position: "relative" } },
              React.createElement("div", { className: "synthesis-code-block" }, codeText),
              React.createElement("div", { style: { position: "absolute", top: 8, right: 8 } },
                React.createElement(SectionCopyBtn, { textToCopy: codeText })
              )
            )
          );
          return;
        }

        // Bullet lines
        if (trimmed.startsWith("- ") || trimmed.startsWith("• ")) {
          bulletBuffer.push(trimmed.replace(/^[-•]\s+/, ""));
          return;
        }

        // Normal paragraph
        flushBullets();
        if (trimmed) {
          elements.push(React.createElement("p", { key: `p-${li}`, style: { margin: "0 0 6px 0" } }, trimmed));
        }
      });

      flushBullets();
      if (inCode) flushCode(); // close unclosed code block

      return elements;
    }

    function formatSynthesis(text) {
      if (!text) return null;
      const headerPattern = new RegExp(
        `(${SECTION_HEADERS.map(h => h.replace(/[.*+?^${}()|[\]\\]/g, "\\$&")).join("|")}):?`,
        "i"
      );
      const parts = text.split(headerPattern);
      if (parts.length <= 1) {
        return React.createElement("div", { className: "synthesis-section-body" }, text);
      }
      const sections = [];
      let i = 1;
      while (i < parts.length) {
        const title = parts[i] ? parts[i].trim() : null;
        const body  = parts[i + 1] ? parts[i + 1].trim() : "";
        if (title) sections.push({ title, body });
        i += 2;
      }
      return sections.map((section, idx) => {
        const bodyElements = parseBodyElements(section.body);
        const plainText = section.body;
        return React.createElement("div", { key: idx, className: "synthesis-section" },
          React.createElement("div", {
            style: { display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 6 }
          },
            React.createElement("div", { className: "synthesis-section-title", style: { margin: 0 } }, section.title),
            React.createElement(SectionCopyBtn, { textToCopy: plainText })
          ),
          React.createElement("div", { className: "synthesis-section-body" }, ...bodyElements)
        );
      });
    }

    function renderUserMessage(text) {
      if (!text) return null;
      const parts = text.split(/(```[\s\S]*?```)/g);
      return parts.map((part, i) => {
        if (part.startsWith("```") && part.endsWith("```")) {
          const inner = part.slice(3, -3);
          const firstNewline = inner.indexOf("\n");
          const code = firstNewline > -1 ? inner.slice(firstNewline + 1) : inner;
          return React.createElement("pre", {
            key: i,
            style: {
              background: "rgba(0,0,0,0.5)",
              border: "1px solid #0f4a66",
              borderLeft: "3px solid #00e8ff",
              borderRadius: 3,
              padding: "10px 14px",
              overflowX: "auto",
              fontSize: 12,
              lineHeight: 1.6,
              margin: "8px 0",
              fontFamily: "'Share Tech Mono', monospace",
              color: "#00e8ff",
              whiteSpace: "pre"
            }
          }, React.createElement("code", null, code));
        }
        return React.createElement("span", { key: i, style: { whiteSpace: "pre-wrap" } }, part);
      });
    }

    // ── Main Interface ─────────────────────────────────────────
    function JarvisInterface({ token: initialToken, isAdmin: initialIsAdmin = false }) {
      const [tokenState, setTokenState] = useState(initialToken);
      const [isAdmin, setIsAdmin] = useState(initialIsAdmin);
      const [q, setQ] = useState("");
      const [txHeight, setTxHeight] = useState(38);
      const [active, setActive] = useState(false);
      const [running, setRunning] = useState(false);
      const [synth, setSynth] = useState("");
      const [confidence, setConfidence] = useState(null);
      const [agentStatuses, setAgentStatuses] = useState({});
      const [seqStatus, setSeqStatus] = useState({});
      const [debateOutputs, setDebateOutputs] = useState([]);
      const [quorumFailed, setQuorumFailed] = useState(false);
      const [quorumMessage, setQuorumMessage] = useState("");
      const [time, setTime] = useState(new Date());
      const [fileText, setFileText] = useState("");
      const [fileName, setFileName] = useState("");
      const [fileSize, setFileSize] = useState("");
      const [forcedMode, setForcedMode] = useState("auto");
      const [history, setHistory] = useState([]);
      const [showHistory, setShowHistory] = useState(false);
      const [error, setError] = useState("");
      const [threadId, setThreadId] = useState(null);
      const [messages, setMessages] = useState([]);
      const [threadsOpen, setThreadsOpen] = useState(true);
      const [debatePanelOpen, setDebatePanelOpen] = useState(true);
      const [selectedTurn, setSelectedTurn] = useState(0);
      const [showScrollTop, setShowScrollTop] = useState(false);
      const [mobileTab, setMobileTab] = useState("chat"); // "chat" | "threads" | "debate"
      const [mobileDrawerOpen, setMobileDrawerOpen] = useState(false);
      const [showOnboard, setShowOnboard] = useState(() => !getOnboardDone());
      const bottomRef = useRef(null);
      const attachRef = useRef(null);
      const stripRef = useRef(null);
      const stripDragRef = useRef({ isDown:false, isDragging:false, startX:0, startScrollLeft:0, suppressClick:false });
      const chatInputRef = useRef(null);
      const maxTxH = 234;
      const resizeTextarea = () => {
        const el = chatInputRef.current;
        if (!el) return;
        el.style.height = 'auto';
        const sh = el.scrollHeight;
        const clamped = Math.min(sh, maxTxH);
        el.style.height = clamped + 'px';
        el.style.overflowY = sh > maxTxH ? 'auto' : 'hidden';
      };
      useEffect(() => {
        const el = chatInputRef.current;
        if (!el) return;
        const h = () => requestAnimationFrame(resizeTextarea);
        el.addEventListener('input', h);
        return () => el.removeEventListener('input', h);
      }, []);
      useEffect(() => { resizeTextarea(); }, [q]);
      const scrollAreaRef = useRef(null);

      const loadHist = useCallback(() => {
        callJarvis({ action: "load_history", token: tokenState })
          .then(r => setHistory(Array.isArray(r.history) ? r.history : []))
          .catch(e => {
            if (e.message.includes("401") || e.message.includes("UNAUTHORIZED")) {
              clearToken(); setTokenState(null); setIsAdmin(false);
            }
          });
      }, [tokenState]);

      useEffect(() => {
        const t = setInterval(() => setTime(new Date()), 1000);
        return () => clearInterval(t);
      }, []);

      useEffect(() => {
        const handleAdminShortcut = async (e) => {
          if (!e.ctrlKey || !e.shiftKey) return;
          if (e.key === "A" || e.key === "a") {
            e.preventDefault();
            const nextSecret = window.prompt("Enter admin demo secret");
            if (!nextSecret) return;
            try {
              const session = await createAdminSession(nextSecret.trim());
              setAdminSecret(nextSecret.trim());
              setToken(session.token);
              setTokenState(session.token);
              setIsAdmin(!!session.isAdmin);
              loadHist();
            } catch (err) {
              window.alert("Admin access denied.");
            }
          }
          if (e.key === "X" || e.key === "x") {
            e.preventDefault();
            clearAdminSecret();
            clearToken();
            setTokenState(null);
            setIsAdmin(false);
          }
        };
        window.addEventListener("keydown", handleAdminShortcut);
        return () => window.removeEventListener("keydown", handleAdminShortcut);
      }, [loadHist]);

      useEffect(() => { bottomRef.current?.scrollIntoView({ behavior: "smooth" }); }, [synth, active, quorumFailed, messages.length]);

      // Scroll to top button visibility
      useEffect(() => {
        const el = scrollAreaRef.current;
        if (!el) return;
        const handleScroll = () => setShowScrollTop(el.scrollTop > 300);
        el.addEventListener("scroll", handleScroll);
        return () => el.removeEventListener("scroll", handleScroll);
      }, []);

      const scrollToTop = () => scrollAreaRef.current?.scrollTo({ top: 0, behavior: "smooth" });

      useEffect(() => { loadHist(); }, [loadHist]);

      const processFile = async (file) => {
        const maxChars = 12000;
        setFileName(file.name);
        setFileSize((file.size / 1024).toFixed(1) + " KB");
        if (file.type === "application/pdf" || file.name.endsWith(".pdf")) {
          try {
            pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
            const ab = await file.arrayBuffer();
            const pdf = await pdfjsLib.getDocument({ data: ab }).promise;
            let text = "";
            for (let i = 1; i <= Math.min(pdf.numPages, 20); i++) {
              const page = await pdf.getPage(i);
              const tc = await page.getTextContent();
              text += tc.items.map(item => item.str).join(" ") + "\n";
            }
            setFileText(text.slice(0, maxChars));
          } catch(e) { setFileText("Could not extract PDF: " + e.message); }
        } else {
          const text = await file.text().catch(() => "");
          setFileText(text.slice(0, maxChars) || "Could not read file.");
        }
      };

      const handleFileDrop = async (e) => {
        e.preventDefault();
        const file = e.dataTransfer?.files?.[0] || e.target?.files?.[0];
        if (file) await processFile(file);
      };

      const clearFile = () => { setFileText(""); setFileName(""); setFileSize(""); };

      const run = async (overrideQ) => {
        const question = overrideQ || q;
        if (!question.trim() && !fileText) return;
        const msgId = Date.now();
        setMessages(prev => [...prev, {
          id: msgId, question, synth: null, confidence: null,
          agentStatuses: {}, debateOutputs: [], pending: true,
          quorumFailed: false, quorumMessage: "", error: ""
        }]);
        setQ("");
        if (chatInputRef.current) { chatInputRef.current.style.height = 'auto'; chatInputRef.current.style.overflowY = 'hidden'; }
        setActive(true); setRunning(true); setSynth(""); setConfidence(null);
        setAgentStatuses({}); setSeqStatus({}); setDebateOutputs([]); setQuorumFailed(false);
        setQuorumMessage(""); setError("");
        // Switch mobile to chat view when running
        setMobileTab("chat");

        try {
          const streamRes = await fetch("https://nexus-demo-production-1512.up.railway.app/api/jarvis/stream", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              token: tokenState, question, fileText: fileText || null,
              threadId: threadId || null,
              forcedMode: forcedMode === "auto" ? null : forcedMode,
            }),
          });

          if (!streamRes.ok) {
            const err = await streamRes.json().catch(async () => {
              const text = await streamRes.text().catch(() => "");
              return { error: text || `HTTP ${streamRes.status}` };
            });
            throw new Error(err.error || err.message || `HTTP ${streamRes.status}`);
          }

          const reader = streamRes.body.getReader();
          const decoder = new TextDecoder();
          let buffer = "";
          let currentEvent = null;
          let streamEndedWithError = false;
          let shouldResetSession = false;

          const surfaceStreamError = (message) => {
            const nextMessage = message || "Connection interrupted. Partial output preserved — please retry.";
            setError(nextMessage);
            setSeqStatus({});
            setMessages(prev => prev.map(m => m.id === msgId ? {
              ...m, pending: false, error: nextMessage
            } : m));
          };

          const handleSSEEvent = (eventName, dataStr) => {
            let data = {};
            try {
              data = JSON.parse(dataStr);
            } catch {
              return;
            }

            if (eventName === "agent_start") {
              setSeqStatus(prev => ({ ...prev, [data.agent]: "processing" }));
            } else if (eventName === "agent_done") {
              setSeqStatus(prev => ({ ...prev, [data.agent]: "complete" }));
              if (data.status) setAgentStatuses(prev => ({ ...prev, [data.agent]: data.status }));
            } else if (eventName === "complete") {
              setSeqStatus({});
              setAgentStatuses(data.agentStatuses || {});
              setDebateOutputs(data.debateOutputs || []);
              if (data.quorumFailed) {
                setQuorumFailed(true);
                setQuorumMessage(data.message || "QUORUM FAILURE — Insufficient agent responses.");
                setMessages(prev => prev.map(m => m.id === msgId ? {
                  ...m, pending: false, quorumFailed: true,
                  quorumMessage: data.message || "", agentStatuses: data.agentStatuses || {},
                  debateOutputs: data.debateOutputs || [],
                } : m));
              } else {
                setConfidence(data.confidence || null);
                setSynth(data.synthesis || "SYNTHESIS UNAVAILABLE.");
                if (data.threadId) setThreadId(data.threadId);
                setMessages(prev => prev.map(m => m.id === msgId ? {
                  ...m, pending: false,
                  synth: data.synthesis || null,
                  confidence: data.confidence || null,
                  agentStatuses: data.agentStatuses || {},
                  debateOutputs: data.debateOutputs || [],
                } : m));
                setSelectedTurn(messages.length);
                loadHist();
              }
            } else if (eventName === "heartbeat") {
              // keepalive — no UI action
            } else if (eventName === "error") {
              const message = data.message || "Stream error";
              if (message.includes("401") || message.includes("UNAUTHORIZED")) {
                shouldResetSession = true;
                streamEndedWithError = true;
              } else {
                streamEndedWithError = true;
                surfaceStreamError(message);
              }
            }
          };

          while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            buffer += decoder.decode(value, { stream: true });
            const lines = buffer.split("\n");
            buffer = lines.pop();
            for (const line of lines) {
              if (line.startsWith("event: ")) {
                currentEvent = line.slice(7).trim();
              } else if (line.startsWith("data: ") && currentEvent) {
                handleSSEEvent(currentEvent, line.slice(6));
                currentEvent = null;
                if (streamEndedWithError) break;
              }
            }
            if (streamEndedWithError) {
              try { await reader.cancel(); } catch {}
              break;
            }
          }

          if (shouldResetSession) {
            clearToken(); setTokenState(null); setIsAdmin(false);
            return;
          }
        } catch(e) {
          if (e.message && (e.message.includes("401") || e.message.includes("UNAUTHORIZED"))) {
            clearToken(); setTokenState(null); setIsAdmin(false); return;
          }
          const nextMessage = (!e?.message || e.message === "Failed to fetch" || /^HTTP \d+$/.test(e.message))
            ? "Connection interrupted. Partial output preserved — please retry."
            : e.message;
          setError(nextMessage);
          setMessages(prev => prev.map(m => m.id === msgId ? {
            ...m, pending: false, error: nextMessage
          } : m));
        }
        setRunning(false);
        chatInputRef.current?.focus();
      };

      const reset = () => {
        setMessages([]); setSelectedTurn(0);
        setActive(false); setSynth(""); setConfidence(null);
        setAgentStatuses({}); setSeqStatus({}); setDebateOutputs([]);
        setQ(""); setRunning(false); setError("");
        setQuorumFailed(false); setQuorumMessage(""); setThreadId(null);
        setMobileTab("chat"); setMobileDrawerOpen(false);
        chatInputRef.current?.focus();
      };

      const loadHistItem = (item) => {
        const tid = item.thread_id || null;
        if (tid) {
          callJarvis({ action: "load_thread", token: tokenState, threadId: tid })
            .then(r => {
              const turns = Array.isArray(r.turns) && r.turns.length > 0 ? r.turns : [item];
              const msgs = turns.map(t => ({
                id: t.id, question: t.question,
                synth: t.synthesis || "", confidence: t.confidence || null,
                agentStatuses: {}, debateOutputs: Array.isArray(t.responses) ? t.responses : [],
                pending: false, quorumFailed: false, quorumMessage: "", error: ""
              }));
              setMessages(msgs);
              setThreadId(tid);
              setSelectedTurn(msgs.length - 1);
              const last = turns[turns.length - 1];
              setSynth(last.synthesis || ""); setConfidence(last.confidence || null);
              setQ(last.question); setActive(true); setRunning(false); setQuorumFailed(false);
            })
            .catch(() => {
              setMessages([{ id: item.id, question: item.question, synth: item.synthesis || "", confidence: item.confidence || null, agentStatuses: {}, debateOutputs: Array.isArray(item.responses) ? item.responses : [], pending: false, quorumFailed: false, quorumMessage: "", error: "" }]);
              setThreadId(tid); setSelectedTurn(0);
              setSynth(item.synthesis || ""); setConfidence(item.confidence || null);
              setQ(item.question); setActive(true); setRunning(false); setQuorumFailed(false);
            });
        } else {
          setMessages([{ id: item.id, question: item.question, synth: item.synthesis || "", confidence: item.confidence || null, agentStatuses: {}, debateOutputs: Array.isArray(item.responses) ? item.responses : [], pending: false, quorumFailed: false, quorumMessage: "", error: "" }]);
          setThreadId(null); setSelectedTurn(0);
          setSynth(item.synthesis || ""); setConfidence(item.confidence || null);
          setQ(item.question); setActive(true); setRunning(false); setQuorumFailed(false);
        }
        setMobileTab("chat"); setMobileDrawerOpen(false);
      };

      const beginStripDrag = (clientX) => {
        const s = stripRef.current; if (!s) return;
        stripDragRef.current.isDown = true;
        stripDragRef.current.isDragging = false;
        stripDragRef.current.startX = clientX;
        stripDragRef.current.startScrollLeft = s.scrollLeft;
        s.classList.add("dragging");
      };

      const moveStripDrag = (clientX) => {
        const s = stripRef.current; const d = stripDragRef.current; if (!s || !d.isDown) return;
        const dx = clientX - d.startX;
        if (Math.abs(dx) > 6) {
          d.isDragging = true;
          d.suppressClick = true;
        }
        if (d.isDragging) s.scrollLeft = d.startScrollLeft - dx;
      };

      const endStripDrag = () => {
        const s = stripRef.current; const d = stripDragRef.current;
        d.isDown = false;
        d.isDragging = false;
        if (s) s.classList.remove("dragging");
      };

      const onStripMouseDown = (e) => {
        if (e.button !== 0) return;
        beginStripDrag(e.clientX);
      };

      const onStripMouseMove = (e) => {
        moveStripDrag(e.clientX);
      };

      const onStripMouseUp = () => {
        endStripDrag();
      };

      const onStripMouseLeave = () => {
        endStripDrag();
      };

      const onTurnPillClick = (idx) => {
        const d = stripDragRef.current;
        if (d.suppressClick) {
          d.suppressClick = false;
          return;
        }
        setSelectedTurn(idx);
      };

      const onStripScroll = () => {
        const s = stripRef.current; if (!s) return;
        const w = s.closest(".turn-wrap");
        if (w) {
          w.querySelector(".fade-l-d").style.opacity = s.scrollLeft < 10 ? "0" : "1";
          w.querySelector(".fade-r-d").style.opacity = (s.scrollLeft + s.clientWidth >= s.scrollWidth - 10) ? "0" : "1";
        }
      };

      const selMsg = messages[selectedTurn];
      const debateBlocks = selMsg?.debateOutputs || [];

      if (!tokenState) return <GuestSessionGate onReady={(t, admin = false) => { setTokenState(t); setIsAdmin(!!admin); }} />;

      // Mobile drawer content
      const mobileDrawerContent = () => {
        if (mobileTab === "threads") {
          return (
            <>
              <div className="mobile-drawer-header">
                <div className="mobile-drawer-title">◈ THREADS</div>
                <button className="mobile-drawer-close" onClick={() => setMobileDrawerOpen(false)}>✕ CLOSE</button>
              </div>
              <div className="mobile-drawer-content">
                <button className="new-query-btn" style={{width:"100%",marginBottom:12}} onClick={() => { reset(); }}>◈ NEW QUERY</button>
                {history.length === 0 && (
                  <div style={{color:"#334455",fontSize:10,textAlign:"center",padding:"20px 0",lineHeight:1.8}}>No threads yet.<br/>Run a query to begin.</div>
                )}
                {(() => {
                  const seen = new Set();
                  const grouped = [];
                  [...history].reverse().forEach(item => {
                    const key = item.thread_id || item.id;
                    if (!seen.has(key)) { seen.add(key); grouped.push(item); }
                  });
                  grouped.reverse();
                  return grouped.map(item => {
                    const tid = item.thread_id || null;
                    const turnCount = tid ? history.filter(h => h.thread_id === tid).length : 1;
                    return (
                      <div key={item.thread_id || item.id}
                        className={`sb-t-item ${threadId && item.thread_id === threadId ? "active" : ""}`}
                        style={{borderRadius:3,marginBottom:4}}
                        onClick={() => loadHistItem(item)}>
                        <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:4}}>
                          <div className="sb-t-title" style={{flex:1,fontSize:10,whiteSpace:"normal",overflow:"visible",opacity:0.8}}>{item.question}</div>
                          <button onClick={async e => {
                            e.stopPropagation();
                            if (tid) {
                              await callJarvis({ action: "delete_thread", token: tokenState, threadId: tid });
                              setHistory(h => h.filter(x => x.thread_id !== tid));
                            } else {
                              await callJarvis({ action: "delete_history", token: tokenState, historyId: item.id });
                              setHistory(h => h.filter(x => x.id !== item.id));
                            }
                          }} style={{background:"transparent",border:"none",color:"#1a2233",cursor:"pointer",fontSize:12,padding:"0 2px",flexShrink:0}}
                            onMouseEnter={e=>e.target.style.color="#ff6b6b"}
                            onMouseLeave={e=>e.target.style.color="#1a2233"}>✕</button>
                        </div>
                        <div className="sb-t-meta" style={{fontSize:9,marginTop:3}}>
                          {new Date(item.created_at).toLocaleDateString()}{item.confidence ? ` · ${item.confidence}` : ""}{turnCount > 1 ? ` · ${turnCount} turns` : ""}
                        </div>
                      </div>
                    );
                  });
                })()}
              </div>
            </>
          );
        }
        if (mobileTab === "debate") {
          return (
            <>
              <div className="mobile-drawer-header">
                <div className="mobile-drawer-title">◈ RAW DEBATE</div>
                <button className="mobile-drawer-close" onClick={() => setMobileDrawerOpen(false)}>✕ CLOSE</button>
              </div>
              <div className="mobile-drawer-content">
                {messages.length > 0 && (
                  <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:12}}>
                    {messages.map((msg, idx) => (
                      <button key={msg.id}
                        className={`t-pill ${selectedTurn === idx ? "active" : ""}`}
                        style={{width:"auto",padding:"4px 12px"}}
                        onClick={() => onTurnPillClick(idx)}>
                        T{idx+1}
                      </button>
                    ))}
                  </div>
                )}
                {messages.length === 0 ? (
                  <div className="d-empty" style={{marginTop:16}}>Run a query to see the raw agent debate here.</div>
                ) : selMsg?.pending ? (
                  <div className="d-empty" style={{marginTop:16}}>Agents processing...</div>
                ) : debateBlocks.length === 0 ? (
                  <div className="d-empty" style={{marginTop:16}}>No debate data for this turn.</div>
                ) : (
                  <>
                    <div className="d-q-label" style={{marginBottom:12}}>"{selMsg?.question}"</div>
                    {debateBlocks.map((block, i) => {
                      const agent = AGENT_UI.find(a => a.key === block.key);
                      return (
                        <div key={i} className="d-block">
                          <div className="d-agent-row">
                            <div className="d-agent-nm" style={{color:agent?.color||"#aaa",fontSize:9,marginBottom:0}}>{block.name}</div>
                            <DebateCopyBtn textToCopy={block.text} />
                          </div>
                          <div className="d-text" style={{fontSize:12}}>{block.text}</div>
                        </div>
                      );
                    })}
                  </>
                )}
              </div>
            </>
          );
        }
        return null;
      };

      return (
        <div style={{height:"100vh",display:"flex",flexDirection:"column"}}>

          {/* Onboarding */}
          {showOnboard && (
            <OnboardOverlay onDone={() => { setOnboardDone(); setShowOnboard(false); }} />
          )}

          {/* Header */}
          <div className="hud-header">
            <div className="header-rail header-rail-left">
              <div className="status-inline"><span className="status-dot"/>ONLINE {isAdmin ? "· ADMIN" : "· DEMO"}</div>
              <button className={`panel-toggle-btn ${threadsOpen?"on":""}`} onClick={() => setThreadsOpen(v=>!v)}>◈ THREADS</button>
            </div>
            <div className="header-brand">
              <div className="jarvis-title">J.A.R.V.I.S</div>
              <div className="jarvis-sub">Sovereign Swarm · Multi-Intelligence Interface V3</div>
            </div>
            <div className="header-rail header-rail-right">
              <button className={`panel-toggle-btn ${debatePanelOpen?"on":""}`} onClick={() => setDebatePanelOpen(v=>!v)}>◈ DEBATE</button>
              <div className="arc-reactor"/>
            </div>
          </div>

          {/* Three panel body */}
          <div className="three-panel-body">

            {/* Thread sidebar — desktop */}
            <div className={`thread-sidebar ${threadsOpen?"":"collapsed"}`}>
              <div className="sb-hdr"><span className="sb-title">◈ THREADS</span></div>
              <button className="new-query-btn" onClick={reset}>◈ NEW QUERY</button>
              <div className="sb-thread-list">
                {history.length === 0 && (
                  <div style={{color:"#1a2233",fontSize:9,textAlign:"center",padding:"20px 10px",lineHeight:1.8}}>
                    No threads yet.<br/>Run a query to begin.
                  </div>
                )}
                {(() => {
                  const seen = new Set();
                  const grouped = [];
                  [...history].reverse().forEach(item => {
                    const key = item.thread_id || item.id;
                    if (!seen.has(key)) { seen.add(key); grouped.push(item); }
                  });
                  grouped.reverse();
                  return grouped.map(item => {
                    const tid = item.thread_id || null;
                    const turnCount = tid ? history.filter(h => h.thread_id === tid).length : 1;
                    return (
                      <div key={item.thread_id || item.id}
                        className={`sb-t-item ${threadId && item.thread_id === threadId ? "active" : ""}`}
                        title={item.question}>
                        <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:4}}>
                          <div className="sb-t-title" style={{flex:1}} onClick={() => loadHistItem(item)}>{item.question}</div>
                          <button onClick={async e => {
                            e.stopPropagation();
                            if (tid) {
                              await callJarvis({ action: "delete_thread", token: tokenState, threadId: tid });
                              setHistory(h => h.filter(x => x.thread_id !== tid));
                            } else {
                              await callJarvis({ action: "delete_history", token: tokenState, historyId: item.id });
                              setHistory(h => h.filter(x => x.id !== item.id));
                            }
                          }} style={{background:"transparent",border:"none",color:"#1a2233",cursor:"pointer",fontSize:10,padding:"0 2px",flexShrink:0,lineHeight:1,transition:"color 0.15s"}}
                            onMouseEnter={e=>e.target.style.color="#ff6b6b"}
                            onMouseLeave={e=>e.target.style.color="#1a2233"}>✕</button>
                        </div>
                        <div className="sb-t-meta" onClick={() => loadHistItem(item)}>
                          {new Date(item.created_at).toLocaleDateString()}{item.confidence ? ` · ${item.confidence}` : ""}{turnCount > 1 ? ` · ${turnCount} turns` : ""}
                        </div>
                      </div>
                    );
                  });
                })()}
              </div>
            </div>

            {/* Chat column */}
            <div className="chat-col">

              {/* Agent strip */}
              <div className="health-dashboard">
                <div className="health-grid">
                  {AGENT_UI.map(agent => {
                    const seq = seqStatus[agent.key];
                    const s = agentStatuses[agent.key];
                    const statusKey = seq ? seq : (s?.status || "pending").toLowerCase();
                    const statusLabel = seq === "processing" ? "PROCESSING..." : seq === "complete" ? "COMPLETE" : (s?.status || "STANDBY");
                    const labelColor = statusKey === "online" ? "#00ff88" : statusKey === "bypassed" ? "#ff6b6b" : statusKey === "processing" ? "#00e8ff" : statusKey === "complete" ? "#00ff88" : "#a89880";
                    return (
                      <div key={agent.key} className={`health-card ${statusKey}`}>
                        <div className="health-name" style={{color:agent.color}}>{agent.name}</div>
                        <div className="health-company">{agent.company}</div>
                        <div className="health-status">
                          <div className={`health-dot ${statusKey}`}/>
                          <span style={{color:labelColor,fontSize:8}}>
                            {statusLabel}{s?.reason ? ` (${s.reason})` : ""}
                          </span>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>

              {/* Thread active bar */}
              {threadId && (
                <div className="thread-active-bar">◈ THREAD ACTIVE — follow-ups continue this conversation</div>
              )}

              {/* Chat scroll area */}
              <div className="chat-scroll-area" ref={scrollAreaRef}>

                {/* Welcome state */}
                {messages.length === 0 && !active && (
                  <div className="chat-welcome">
                    <div className="chat-welcome-title">◈ SOVEREIGN SWARM INTELLIGENCE ◈</div>
                    <div className="chat-welcome-sub">
                      Ask anything. The swarm debates. JARVIS synthesizes.
                    </div>
                    <div className="welcome-samples">
                      {SAMPLES.map((s, i) => (
                        <button key={i} className="welcome-sample-btn" onClick={() => run(s)}>{s}</button>
                      ))}
                    </div>
                  </div>
                )}

                {/* Messages */}
                {messages.map((msg, idx) => (
                  <React.Fragment key={msg.id}>
                    {/* User message */}
                    <div className="chat-u-msg">
                      <p style={{whiteSpace:"pre-wrap"}}>{renderUserMessage(msg.question)}</p>
                    </div>

                    {/* Pending / processing */}
                    {msg.pending && (
                      <div className="swarm-processing">
                        <div className="swarm-processing-label">◈ SWARM INTELLIGENCE PROCESSING</div>
                        <div className="swarm-dots">
                          <div className="swarm-dot"/>
                          <div className="swarm-dot"/>
                          <div className="swarm-dot"/>
                        </div>
                      </div>
                    )}

                    {/* Error */}
                    {msg.error && (
                      <div style={{padding:"14px 18px",background:"rgba(28,0,0,0.8)",border:"1px solid #4a0000",borderLeft:"3px solid #ff6b6b",borderRadius:3,animation:"fadeSlide 0.4s ease"}}>
                        <div style={{fontFamily:"Orbitron,sans-serif",fontSize:9,color:"#ff6b6b",letterSpacing:"0.25em",marginBottom:6}}>⚠ SYSTEM ERROR</div>
                        <div style={{fontSize:12,color:"#ff9999",lineHeight:1.6}}>{msg.error}</div>
                      </div>
                    )}

                    {/* Quorum failure */}
                    {!msg.pending && msg.quorumFailed && (
                      <div className="quorum-panel">
                        <div className="quorum-label">⚠ QUORUM FAILURE</div>
                        <div className="quorum-text">{msg.quorumMessage || "Insufficient agent responses. Please retry."}</div>
                      </div>
                    )}

                    {/* Synthesis */}
                    {!msg.pending && !msg.quorumFailed && msg.synth && (
                      <div className="chat-j-msg">
                        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6,flexWrap:"wrap"}}>
                          <div style={{fontFamily:"Orbitron,sans-serif",fontSize:9,color:var_gold,letterSpacing:"0.3em",fontWeight:700,textShadow:"0 0 8px rgba(255,200,68,0.4)"}}>
                            ◈ J.A.R.V.I.S SYNTHESIS — CROSS-INTELLIGENCE ANALYSIS
                          </div>
                          {(() => {
                            if (!msg.confidence) return null;
                            const c = msg.confidence.toLowerCase();
                            return (
                              <span className={`conf-compact ${c}`}>
                                <span className={`conf-diamond-sm ${c}`}/>
                                <span className={`conf-label-sm ${c}`}>{msg.confidence}</span>
                              </span>
                            );
                          })()}
                          <button className="copy-btn" id={`copy-${msg.id}`} onClick={() => {
                            navigator.clipboard.writeText(msg.synth || "").then(() => {
                              const btn = document.getElementById(`copy-${msg.id}`);
                              if (btn) { btn.textContent = "✓ COPIED"; btn.classList.add("copied"); setTimeout(() => { btn.textContent = "◈ COPY"; btn.classList.remove("copied"); }, 2000); }
                            });
                          }}>◈ COPY</button>
                        </div>
                        <div className="synthesis-panel" style={{margin:0}}>
                          <div className="synthesis-text">{formatSynthesis(msg.synth)}</div>
                        </div>
                      </div>
                    )}
                  </React.Fragment>
                ))}

                <div ref={bottomRef}/>
              </div>

              {/* Scroll to top button */}
              <button
                className={`scroll-top-btn ${showScrollTop ? "visible" : ""}`}
                onClick={scrollToTop}
